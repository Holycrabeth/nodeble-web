name: shellcheck

# CI gate per L1 §7.6 + 5/13 PMCC/DS direct-push banked lesson — every PR
# + push to main gets shellcheck + bash-syntax + integration matrix
# signal before any consumer (curl-installable URL at nodeble.app/
# bootstrap.sh OR Mac App Model B chain installer) fetches the script.
#
# Scope: lint `bootstrap.sh` (repo root) + `tests/integration/*.sh`.
# Mirrors nodeble-api-server's shellcheck.yml structure adapted to
# nodeble-web's bootstrap.sh-at-root layout (per L1 §7.6 mirror
# principle, Yongtao 5/14 T-20260514-160943 PR mirror).
#
# Initial scope: test_bootstrap.sh only. test_bootstrap_chain.sh runs
# more advanced chain tests that need NODEBLE_TEST_PAT secret + full
# bundle fixtures — P3 extension when chain installer has active
# customers requiring CI gating.

on:
  push:
    branches: [main]
    paths:
      - 'bootstrap.sh'
      - 'tests/integration/**.sh'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    paths:
      - 'bootstrap.sh'
      - 'tests/integration/**.sh'
      - '.github/workflows/shellcheck.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck

      - name: Lint bootstrap.sh
        run: shellcheck -x bootstrap.sh

      - name: Lint tests/integration/*.sh
        run: |
          # Test fixtures are bash with the same strictness as production
          # scripts. -x: follow `source` directives.
          shellcheck -x tests/integration/*.sh

  bash-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n on bootstrap.sh + integration tests
        run: |
          bash -n bootstrap.sh
          for f in tests/integration/*.sh; do
            bash -n "$f"
          done

  integration-tests:
    # Docker-based bootstrap.sh integration matrix. Container OS images
    # + apt update can be slow; allow up to 30 min per PR #9 (api-server)
    # precedent. If runner can't access Docker daemon (rare on GitHub
    # Actions ubuntu-latest), the test script falls through to its own
    # SKIP path. Scope: test_bootstrap.sh only (test_python_install
    # included; happy-path tests SKIP without NODEBLE_TEST_PAT secret).
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [shellcheck, bash-syntax]
    steps:
      - uses: actions/checkout@v4

      - name: Run integration test matrix
        run: bash tests/integration/test_bootstrap.sh
